<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A6B"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  
  <!-- Document Icon -->
  <rect x="146" y="106" width="220" height="300" rx="20" fill="white"/>
  
  <!-- Document Lines -->
  <rect x="176" y="156" width="160" height="12" rx="6" fill="#1B3A6B"/>
  <rect x="176" y="186" width="140" height="12" rx="6" fill="#94A3B8"/>
  <rect x="176" y="216" width="160" height="12" rx="6" fill="#94A3B8"/>
  <rect x="176" y="246" width="120" height="12" rx="6" fill="#94A3B8"/>
  <rect x="176" y="276" width="160" height="12" rx="6" fill="#94A3B8"/>
  <rect x="176" y="306" width="140" height="12" rx="6" fill="#94A3B8"/>
  
  <!-- Stamp/Seal Circle -->
  <circle cx="256" cy="356" r="50" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <circle cx="256" cy="356" r="35" fill="none" stroke="#C41E3A" stroke-width="4"/>
  
  <!-- Inner Text -->
  <text x="256" y="350" text-anchor="middle" font-size="16" font-weight="bold" fill="#C41E3A" font-family="serif">INDIA</text>
  <text x="256" y="368" text-anchor="middle" font-size="12" fill="#C41E3A" font-family="serif">e-STAMP</text>
  
  <!-- Telugu Character -->
  <text x="256" y="400" text-anchor="middle" font-size="24" fill="#1B3A6B" font-family="Noto Sans Telugu, sans-serif">లె</text>
</svg>
